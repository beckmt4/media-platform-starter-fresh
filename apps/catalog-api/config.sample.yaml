version: 1

server:
  host: "0.0.0.0"
  port: 8000
  log_level: info

# Storage backend.
# Leave CATALOG_DB_PATH unset (or empty) to use the in-memory store.
# Set CATALOG_DB_PATH to a file path to enable SQLite persistence, e.g.:
#   CATALOG_DB_PATH=/mnt/user/appdata/catalog-api/catalog.db
storage:
  backend: sqlite
  db_path: /mnt/user/appdata/catalog-api/catalog.db
