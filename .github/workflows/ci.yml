name: ci

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff across all Python sources + yamllint across all YAML
  # ---------------------------------------------------------------------------
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install --upgrade pip ruff yamllint

      - name: ruff check
        run: ruff check apps/ services/ workers/ tests/ scripts/

      - name: yamllint
        run: yamllint .

  # ---------------------------------------------------------------------------
  # Config & policy validation: validate_config.py + repo-level tests/
  # ---------------------------------------------------------------------------
  config-validate:
    name: config and policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --upgrade pip pyyaml pytest

      - name: Validate config files
        run: python scripts/validate_config.py

      - name: Run policy and config tests
        run: pytest tests/ -v

  # ---------------------------------------------------------------------------
  # Per-component tests: one job per service/worker via matrix
  # Media processing is never invoked — all tests use fixtures or monkeypatching
  # ---------------------------------------------------------------------------
  test:
    name: test (${{ matrix.component.name }})
    runs-on: ubuntu-latest
    needs: [lint, config-validate]
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: catalog-api
            dir: apps/catalog-api
          - name: media-policy-engine
            dir: services/media-policy-engine
          - name: subtitle-intel
            dir: services/subtitle-intel
          - name: jav-normalizer
            dir: services/jav-normalizer
          - name: subtitle-worker
            dir: workers/subtitle-worker
          - name: transcode-worker
            dir: workers/transcode-worker

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ${{ matrix.component.dir }}/pyproject.toml

      - name: Install ${{ matrix.component.name }}
        working-directory: ${{ matrix.component.dir }}
        run: pip install --upgrade pip && pip install -e ".[dev]"

      - name: Test ${{ matrix.component.name }}
        working-directory: ${{ matrix.component.dir }}
        run: pytest
