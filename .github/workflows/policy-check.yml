name: policy-check

# Runs on any PR that touches policy contracts, config, or schemas.
# Validates structure AND runs the full policy test suite.
on:
  pull_request:
    paths:
      - "config/**"
      - "schemas/**"
      - "tests/test_policy_files.py"
      - "tests/test_config_files.py"
      - "CLAUDE.md"

jobs:
  policy-check:
    name: policy and config validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install --upgrade pip pyyaml pytest

      - name: Validate config files (fast structural check)
        run: python scripts/validate_config.py

      - name: Run full policy test suite
        run: pytest tests/test_policy_files.py tests/test_config_files.py -v
