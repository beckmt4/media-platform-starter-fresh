name: policy-check

on:
  pull_request:
    paths:
      - "config/**"
      - "schemas/**"
      - "workflows/**"
      - "CLAUDE.md"
      - ".claude/**"

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema
      - run: python scripts/validate_config.py
